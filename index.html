<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Visualización Geográfica Nacional</title>

  <!-- Estilos base -->
  <link rel="stylesheet" href="styles.css">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

  <!-- Clustering -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
</head>

<body>

  <!-- === Encabezado institucional === -->
  <header style="position:sticky;top:0;z-index:9999;display:flex;align-items:center;justify-content:space-between;
      background:white;padding:10px 20px;border-bottom:3px solid #1DB954;">
    <div style="display:flex;align-items:center;gap:12px;">
      <img src="logo.png" alt="Logo MinEduc" style="height:60px;">
    </div>
    <h1 style="font-size:20px;color:#003366;margin:0;font-weight:600;text-align:center;flex:1;">
      Sistema de Visualización Geográfica Nacional
    </h1>
    <div>
      <img src="escudo_ecuador.png" alt="Escudo Nacional" style="height:60px;">
    </div>
  </header>

  <!-- === KPI bar === -->
  <div id="kpi-bar" style="position:fixed;z-index:9998;top:85px;left:10px;background:white;padding:8px 12px;
       border:1px solid #000;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.15);font-family:sans-serif;">
    <strong>Total cargados:</strong> <span id="kpi-total">—</span>
    &nbsp;|&nbsp;
    <strong>Visibles (filtros):</strong> <span id="kpi-visible">—</span>
  </div>

  <!-- === Mapa principal === -->
  <div id="map" style="width:100%;height:calc(100vh - 120px);margin-top:10px;"></div>

  <script src="app.js"></script>
</body>
</html>
